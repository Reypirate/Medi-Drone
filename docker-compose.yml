services:
  # ──────────────────────────────────────────────────────────────────
  # Databases
  # ──────────────────────────────────────────────────────────────────

  mysql-inventory:
    image: mysql:8.0
    container_name: mysql-inventory
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - ./services/inventory/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medidrone-net

  mysql-drone:
    image: mysql:8.0
    container_name: mysql-drone
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - ./services/drone_management/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medidrone-net

  mysql-order:
    image: mysql:8.0
    container_name: mysql-order
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - ./services/order/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3309:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medidrone-net

  # ──────────────────────────────────────────────────────────────────
  # Message Broker
  # ──────────────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medidrone-net

  # ──────────────────────────────────────────────────────────────────
  # Atomic Microservices
  # ──────────────────────────────────────────────────────────────────

  inventory:
    build: ./services/inventory
    container_name: inventory
    ports:
      - "5003:5003"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5003/health" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    environment:
      MYSQL_HOST: mysql-inventory
      MYSQL_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    depends_on:
      mysql-inventory:
        condition: service_healthy
    networks:
      - medidrone-net

  drone-management:
    build: ./services/drone_management
    container_name: drone-management
    ports:
      - "5008:5008"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5008/health" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    environment:
      MYSQL_HOST: mysql-drone
      MYSQL_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    depends_on:
      mysql-drone:
        condition: service_healthy
    networks:
      - medidrone-net

  weather:
    build: ./services/weather
    container_name: weather
    ports:
      - "5006:5006"
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    networks:
      - medidrone-net

  geolocation:
    build: ./services/geolocation
    container_name: geolocation
    ports:
      - "5007:5007"
    environment:
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    networks:
      - medidrone-net

  route-planning:
    build: ./services/route_planning
    container_name: route-planning
    ports:
      - "5009:5009"
    networks:
      - medidrone-net

  notification:
    build: ./services/notification
    container_name: notification
    ports:
      - "5004:5004"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      TWILIO_TO_NUMBER: ${TWILIO_TO_NUMBER:-+6591234567}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - medidrone-net

  # ──────────────────────────────────────────────────────────────────
  # Composite Microservices
  # ──────────────────────────────────────────────────────────────────

  order:
    build:
      context: ./services
      dockerfile: order/Dockerfile
    container_name: order
    ports:
      - "5001:5001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/health" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    environment:
      INVENTORY_URL: http://inventory:5003
      HOSPITAL_URL: https://personal-oyxjh2hr.outsystemscloud.com/HospitalService/rest/HospitalAPI
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      MYSQL_HOST: mysql-order
      MYSQL_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    depends_on:
      rabbitmq:
        condition: service_healthy
      inventory:
        condition: service_started
      mysql-order:
        condition: service_healthy
    networks:
      - medidrone-net

  drone-dispatch:
    build: ./services/drone_dispatch
    container_name: drone-dispatch
    ports:
      - "5002:5002"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5002/health" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    environment:
      ORDER_URL: http://order:5001
      HOSPITAL_URL: https://personal-oyxjh2hr.outsystemscloud.com/HospitalService/rest/HospitalAPI
      GEOLOCATION_URL: http://geolocation:5007
      DRONE_MGMT_URL: http://drone-management:5008
      WEATHER_URL: http://weather:5006
      ROUTE_URL: http://route-planning:5009
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      POLL_INTERVAL: 30
    depends_on:
      rabbitmq:
        condition: service_healthy
      order:
        condition: service_started
      geolocation:
        condition: service_started
      drone-management:
        condition: service_started
      weather:
        condition: service_started
      route-planning:
        condition: service_started
    networks:
      - medidrone-net

  # ──────────────────────────────────────────────────────────────────
  # API Gateway (BTL)
  # ──────────────────────────────────────────────────────────────────

  kong:
    image: kong:3.8
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    volumes:
      - ./kong:/kong
    # Use tmpfs for sockets to prevent stale socket files on restart
    tmpfs:
      - /usr/local/kong/sockets:uid=1000,gid=1000
    ports:
      - "8000:8000"
      - "8001:8001"
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      inventory:
        condition: service_healthy
      drone-management:
        condition: service_healthy
      order:
        condition: service_healthy
      drone-dispatch:
        condition: service_healthy
    networks:
      - medidrone-net

  # ──────────────────────────────────────────────────────────────────
  # Web UI
  # ──────────────────────────────────────────────────────────────────

  ui:
    image: medi-drone-frontend:latest
    container_name: medidrone-ui
    env_file:
      - ./frontend/.env
    environment:
      VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      kong:
        condition: service_started
    networks:
      - medidrone-net

networks:
  medidrone-net:
    driver: bridge
