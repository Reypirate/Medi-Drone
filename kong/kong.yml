_format_version: "3.0"

services:
  - name: order-service
    url: http://order:5001
    routes:
      - name: order-routes
        paths:
          - /api/order
        strip_path: true
        methods:
          - GET
          - POST
          - DELETE
          - OPTIONS
      - name: order-list-routes
        paths:
          - /api/orders
        strip_path: true
        methods:
          - GET
          - OPTIONS

  - name: dispatch-service
    url: http://drone-dispatch:5002
    routes:
      - name: dispatch-routes
        paths:
          - /api/dispatch
        strip_path: true
        methods:
          - GET
          - POST
          - OPTIONS

  - name: inventory-service
    url: http://inventory:5003
    routes:
      - name: inventory-routes
        paths:
          - /api/inventory
        strip_path: true
        methods:
          - GET
          - POST
          - OPTIONS

  - name: hospital-service
    url: https://personal-oyxjh2hr.outsystemscloud.com/HospitalService/rest/HospitalAPI
    routes:
      - name: hospital-routes
        paths:
          - /api/hospital
          - /api/hospitals
        strip_path: true
        methods:
          - GET
          - OPTIONS
        plugins:
          - name: proxy-cache
            config:
              response_code:
                - 200
              request_method:
                - GET
              content_type:
                - application/json
                - application/json; charset=utf-8
              cache_ttl: 300
              strategy: memory

  - name: drone-management-service
    url: http://drone-management:5008
    routes:
      - name: drone-routes
        paths:
          - /api/drones
        strip_path: true
        methods:
          - GET
          - PATCH
          - OPTIONS

  - name: weather-service
    url: http://weather:5006
    routes:
      - name: weather-routes
        paths:
          - /api/weather
        strip_path: true
        methods:
          - GET
          - POST
          - OPTIONS

  - name: notification-service
    url: http://notification:5004
    routes:
      - name: notification-routes
        paths:
          - /api/notification
        strip_path: true
        methods:
          - GET
          - OPTIONS

  - name: geolocation-service
    url: http://geolocation:5007
    routes:
      - name: geolocation-routes
        paths:
          - /api/geolocation
        strip_path: true
        methods:
          - GET
          - OPTIONS
    plugins:
      - name: proxy-cache
        config:
          response_code:
            - 200
          request_method:
            - GET
          content_type:
            - application/json
          cache_ttl: 600           
          strategy: memory

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
        - Accept
      exposed_headers:
        - X-Auth-Token
      credentials: false
      max_age: 3600
